    <g transform="translate(28,30)">
      <rect x="0" y="0" width="13" height="13" fill="#2F6FE6"/>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/nav-hero.jsx"></script>
<script type="text/babel" src="app/lower.jsx"></script>
<script type="text/babel" src="app/about.jsx"></script>

<script type="text/babel">
const { Nav, Footer, AboutHero, StoryDecades, WhyBuilt, Clients, Team, QboidPartner, CloseBand } = window;
const Tick = () => <div className="tickrule" aria-hidden="true"></div>;

function App() {
  React.useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    if (!("IntersectionObserver" in window) || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      els.forEach(e => e.classList.add("in")); return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: "0px 0px -6% 0px" });
    els.forEach(e => io.observe(e));
    const fallback = setTimeout(() => els.forEach(e => e.classList.add("in")), 1400);
    return () => { io.disconnect(); clearTimeout(fallback); };
  }, []);
  return (
    <React.Fragment>
      <Nav active="about" />
      <main>
        <AboutHero />
        <Tick />
        <StoryDecades />
        <WhyBuilt />
        <Clients />
        <Team />
        <QboidPartner />
        <CloseBand />
      </main>
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
