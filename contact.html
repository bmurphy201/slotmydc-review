<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="favicon.svg" />
<title>Contact — SlotMyDC | Book a Working Session</title>
<meta name="description" content="See your savings before you commit. Book a 30-minute working session with the SlotMyDC team — we pull up your numbers and build the savings estimate live on the call." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="contact.css" />
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#F6F5F1"/>
    <g transform="translate(28,30)">
      <rect x="0" y="0" width="13" height="13" fill="#2F6FE6"/>
      <rect x="15" y="0" width="13" height="13" fill="#E4502B"/>
      <rect x="30" y="0" width="13" height="13" fill="#0C1A33"/>
      <rect x="0" y="15" width="13" height="13" fill="#E4502B"/>
      <rect x="15" y="15" width="13" height="13" fill="#0C1A33"/>
      <rect x="30" y="15" width="13" height="13" fill="#2F6FE6"/>
      <rect x="0" y="30" width="13" height="13" fill="#0C1A33"/>
      <rect x="15" y="30" width="13" height="13" fill="#2F6FE6"/>
      <rect x="30" y="30" width="13" height="13" fill="#E4502B"/>
    </g>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/nav-hero.jsx"></script>
<script type="text/babel" src="app/lower.jsx"></script>
<script type="text/babel" src="app/contact.jsx"></script>

<script type="text/babel">
const { Nav, Footer, ContactHero, ContactBody, DirectContact } = window;

function App() {
  React.useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    if (!("IntersectionObserver" in window) || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      els.forEach(e => e.classList.add("in")); return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: "0px 0px -6% 0px" });
    els.forEach(e => io.observe(e));
    const fallback = setTimeout(() => els.forEach(e => e.classList.add("in")), 1400);
    return () => { io.disconnect(); clearTimeout(fallback); };
  }, []);
  return (
    <React.Fragment>
      <Nav active="contact" />
      <main>
        <ContactHero />
        <ContactBody />
        <DirectContact />
      </main>
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
